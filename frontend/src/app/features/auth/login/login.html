<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="bg-white shadow-xl rounded-2xl p-8">

            <!-- Header -->
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
                <p class="text-gray-500 text-sm mt-1">
                    Sign in to your account
                </p>
            </div>

            <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">
                        Email
                    </label>
                    <input type="email" formControlName="email" placeholder="you@example.com"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black focus:outline-none transition" />

                    <p class="text-red-500 text-xs mt-1 min-h-[16px]">
                        <span *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
                            Enter a valid email
                        </span>
                    </p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">
                        Password
                    </label>
                    <input type="password" formControlName="password" placeholder="••••••••"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black focus:outline-none transition" />

                    <p class="text-red-500 text-xs mt-1 min-h-[16px]">
                        <span *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
                            Minimum 6 characters
                        </span>
                    </p>

                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-600">
                        <input type="checkbox" class="rounded border-gray-300" />
                        Remember me
                    </label>

                    <a href="#" class="text-black font-medium hover:underline">
                        Forgot password?
                    </a>
                </div>

                <!-- Button -->
                <button type="submit" [disabled]="loading()"
                    class="w-full bg-black text-white py-2 rounded-lg font-medium hover:bg-gray-800 transition disabled:opacity-50">
                    <span *ngIf="!loading()">Sign In</span>
                    <span *ngIf="loading()">Signing in...</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="my-6 flex items-center gap-2">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-gray-400 text-xs">OR</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <!-- Social Login -->
            <button
                class="w-full border py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" />
                Continue with Google
            </button>

            <!-- Footer -->
            <p class="text-center text-sm text-gray-500 mt-6">
                Don’t have an account?
                <a href="/auth/register" class="text-black font-medium hover:underline">
                    Sign up
                </a>
            </p>
        </div>
    </div>
</div>
